            <main>
                <h2>Calculator</h2>
                <p>Simple calculator built using JavaScript.</p>

                <!-- Calculator Section -->
                <div class="calculator">
                    <label class="label-number" for="first-number">1st #: </label>
                    <input id="first-number" type="number">
                
                    <label class="label-number" for="second-number">2nd #: </label>
                    <input id="second-number" type="number">
                
                    <!-- Calculator Buttons -->
                    <div class="buttons">
                        <button onclick="addition()"> + </button>
                        <button onclick="subtraction()"> - </button>
                        <button onclick="multiplication()"> * </button>
                        <button onclick="division()"> / </button>
                        <button onclick="power()"> ^ </button>
                        <button onclick="clearFields()"> Clear </button>
                    </div>
                
                    <!-- Output Section -->
                    <h3 id="output"></h3>
                </div>
